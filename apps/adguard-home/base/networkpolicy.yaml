apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  ingress:
  # AdGuard UI (:3000) is served over the public Envoy edge but locked to the
  # NetBird overlay by a SecurityPolicy (clientCIDRs 100.64.0.0/10); it never
  # reaches the internet (§8/§10). The Envoy proxies run hostNetwork, so their
  # traffic to this pod carries the host/remote-node identity. DNS (:53) is a
  # direct hostNetwork path on the NetBird overlay (nb-wt0) — overlay-only, never
  # internet; overlay reachability is governed by NetBird, not per-port nftables
  # (see public-cluster-nix roles/public/cluster-server.nix).
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '3000'
        protocol: TCP
  egress:
  - toCIDRSet:
    - cidr: 9.9.9.9/32
    - cidr: 149.112.112.112/32
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
