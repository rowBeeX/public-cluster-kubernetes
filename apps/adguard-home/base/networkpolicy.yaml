apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  ingress:
  # Die AdGuard-UI auf :3000 liegt am Public Envoy Edge, wird aber durch eine
  # SecurityPolicy auf das NetBird-Overlay 100.64.0.0/10 begrenzt. Envoys
  # hostNetwork-Proxies tragen gegenüber dem Pod die Identität host/remote-node.
  # DNS auf :53 läuft direkt per hostNetwork über nb-wt0 und ist nie öffentlich;
  # die Erreichbarkeit regelt NetBird statt einer nftables-Portfreigabe.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '3000'
        protocol: TCP
  egress:
  - toCIDRSet:
    - cidr: 9.9.9.9/32
    - cidr: 149.112.112.112/32
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
