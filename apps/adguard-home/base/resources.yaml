apiVersion: v1
kind: Namespace
metadata:
  name: app-adguard-home
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-adguard-home}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 25m, memory: 64Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: quota, namespace: app-adguard-home}
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 512Mi
    requests.storage: 10Gi
    persistentvolumeclaims: "2"
    pods: "4"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: adguard-data, namespace: app-adguard-home}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests: {storage: 5Gi}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: adguard-home, namespace: app-adguard-home}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: adguard-home}
  template:
    metadata:
      labels: {app.kubernetes.io/name: adguard-home}
    spec:
      hostNetwork: true
      dnsPolicy: None
      dnsConfig:
        nameservers: [9.9.9.9, 149.112.112.112]
      nodeSelector: {public.sedware.net/control-plane: "true"}
      initContainers:
      - name: bootstrap-config
        image: 
          docker.io/rancher/mirrored-library-busybox:1.37.0@sha256:101b4afd76732482eff9b95cae5f94bcf295e521fbec4e01b69c5421f3f3f3e5
        command:
        - sh
        - -ec
        - |
          mkdir -p /data/conf /data/work
          if [ ! -s /data/conf/AdGuardHome.yaml ]; then
            cp /bootstrap/AdGuardHome.yaml /data/conf/AdGuardHome.yaml
            chmod 0600 /data/conf/AdGuardHome.yaml
          fi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: data, mountPath: /data}
        - {name: bootstrap, mountPath: /bootstrap, readOnly: true}
      containers:
      - name: adguard-home
        image: 
          docker.io/adguard/adguardhome:v0.107.77@sha256:e6f2b8bcda06064ab055b44933a4f0e983c35558b9cdb8d2e7ab1efcee36d890
        ports:
        - {name: dns-tcp, protocol: TCP, containerPort: 53}
        - {name: dns-udp, protocol: UDP, containerPort: 53}
        - {name: http, protocol: TCP, containerPort: 3000}
        readinessProbe:
          httpGet: {path: /, port: http}
          initialDelaySeconds: 10
        livenessProbe:
          httpGet: {path: /, port: http}
          initialDelaySeconds: 30
        resources:
          requests: {cpu: 50m, memory: 64Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL], add: [NET_BIND_SERVICE]}
          readOnlyRootFilesystem: true
        volumeMounts:
        - {name: data, mountPath: /opt/adguardhome/conf, subPath: conf}
        - {name: data, mountPath: /opt/adguardhome/work, subPath: work}
        - {name: tmp, mountPath: /tmp}
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: adguard-data}
      - name: tmp
        emptyDir: {sizeLimit: 64Mi}
      - name: bootstrap
        secret: {secretName: adguard-config}
---
apiVersion: v1
kind: Service
metadata: {name: adguard-home, namespace: app-adguard-home}
spec:
  selector: {app.kubernetes.io/name: adguard-home}
  ports:
  - {name: http, port: 3000, targetPort: http}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-adguard-home}
spec:
  endpointSelector: {}
  ingress:
  # AdGuard UI (:3000) is served over the public Envoy edge but locked to the
  # NetBird overlay by a SecurityPolicy (clientCIDRs 100.64.0.0/10); it never
  # reaches the internet (§8/§10). The Envoy proxies run hostNetwork, so their
  # traffic to this pod carries the host/remote-node identity. DNS (:53) stays a
  # direct hostNetwork path gated by host nftables on nb-wt0 (see public-cluster-nix).
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '3000'
        protocol: TCP
  egress:
  - toCIDRSet:
    - cidr: 9.9.9.9/32
    - cidr: 149.112.112.112/32
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
---
# AdGuard UI over the public Envoy edge with the wildcard TLS cert. Reachability
# is locked to the NetBird overlay by the SecurityPolicy below (§8/§10): the
# gateway serves the wildcard host, but Envoy denies any client outside
# 100.64.0.0/10, so the UI never reaches the internet. adguard.<domain> has no
# public Cloudflare record (see cluster-testing PUBLIC_EDGE_HOSTS) — NetBird
# clients resolve it via AdGuard to the host-1 overlay IP and hit the co-located
# Envoy there.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: adguard-home, namespace: app-adguard-home}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [adguard.dev5.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: adguard-home, port: 3000}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata: {name: adguard-netbird-only, namespace: app-adguard-home}
spec:
  targetRefs:
  - {group: gateway.networking.k8s.io, kind: HTTPRoute, name: adguard-home}
  authorization:
    defaultAction: Deny
    rules:
    - action: Allow
      principal:
        clientCIDRs:
        - 100.64.0.0/10
