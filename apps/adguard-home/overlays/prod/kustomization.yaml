apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay. Es enthält nur Namespace-Label und öffentlichen HTTPRoute-
# Hostnamen ohne Dev-Generationssegment. Die NetBird-only-SecurityPolicy der
# Basis bleibt bestehen; die UI ist nur aus 100.64.0.0/10 erreichbar.
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-adguard-home
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  - target:
      kind: HTTPRoute
      name: adguard-home
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: adguard.sedware.net
