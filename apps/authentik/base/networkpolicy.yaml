apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-authentik}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-authentik}
spec:
  endpointSelector: {}
  ingress:
  # Das Envoy Gateway ist der Public HTTP Edge. Seine hostNetwork-Proxies auf den
  # Gateway-Nodes erscheinen Cilium als host/remote-node statt reserved:ingress.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '9000'
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-authentik
    toPorts:
    - ports:
      - port: '9000'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-authentik
    toPorts:
    - ports:
      - port: '9000'
        protocol: TCP
  # Egress zum zentralen PostgreSQL in app-postgresql.
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-postgresql
    toPorts:
    - ports:
      - port: '5432'
        protocol: TCP
  # Egress zum gemeinsamen Cache in app-valkey.
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-valkey
    toPorts:
    - ports:
      - port: '6379'
        protocol: TCP
