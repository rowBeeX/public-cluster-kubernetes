apiVersion: v1
kind: Namespace
metadata:
  name: app-authentik
  labels:
    app.kubernetes.io/part-of: public-cluster
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: LimitRange
metadata: { name: defaults, namespace: app-authentik }
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 50m, memory: 128Mi }
      default: { cpu: "1", memory: 1Gi }
---
apiVersion: v1
kind: ResourceQuota
metadata: { name: quota, namespace: app-authentik }
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    limits.cpu: "6"
    limits.memory: 7Gi
    persistentvolumeclaims: "3"
    requests.storage: 40Gi
    pods: "10"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: authentik-media, namespace: app-authentik }
spec:
  accessModes: [ReadWriteMany]
  storageClassName: public-shared-bulk
  resources:
    requests: { storage: 10Gi }
---
apiVersion: v1
kind: Service
metadata: { name: postgresql, namespace: app-authentik }
spec:
  selector: { app.kubernetes.io/name: authentik-postgresql }
  ports:
    - { name: postgresql, port: 5432, targetPort: postgresql }
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgresql, namespace: app-authentik }
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: authentik-postgresql }
  template:
    metadata:
      labels: { app.kubernetes.io/name: authentik-postgresql }
    spec:
      nodeSelector: { public.sedware.net/control-plane: "true" }
      securityContext: { fsGroup: 70, fsGroupChangePolicy: OnRootMismatch }
      containers:
        - name: postgresql
          image: docker.io/library/postgres:17-alpine@sha256:0a8a1e76503c091f0feb387d51b10fcd746c2d61cf6cdd6e8356973a45e40a0f
          ports:
            - { name: postgresql, containerPort: 5432 }
          env:
            - { name: POSTGRES_DB, value: authentik }
            - { name: POSTGRES_USER, value: authentik }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-runtime, key: POSTGRES_PASSWORD } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          readinessProbe:
            exec: { command: [pg_isready, -U, authentik] }
            initialDelaySeconds: 5
          livenessProbe:
            exec: { command: [pg_isready, -U, authentik] }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            runAsUser: 70
            runAsGroup: 70
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests: { storage: 20Gi }
---
apiVersion: v1
kind: Service
metadata: { name: valkey, namespace: app-authentik }
spec:
  selector: { app.kubernetes.io/name: authentik-valkey }
  ports:
    - { name: valkey, port: 6379, targetPort: valkey }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: valkey, namespace: app-authentik }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: authentik-valkey }
  template:
    metadata:
      labels: { app.kubernetes.io/name: authentik-valkey }
    spec:
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:8-alpine@sha256:18c7010efe0a74c334ee01bd2c5632735d2c0d9518f85b9ad3d995314c6a0b7a
          args: [valkey-server, --save, "", --appendonly, "no"]
          ports:
            - { name: valkey, containerPort: 6379 }
          readinessProbe: { exec: { command: [valkey-cli, ping] }, initialDelaySeconds: 3 }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 250m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
            runAsUser: 999
            runAsGroup: 999
---
apiVersion: v1
kind: Service
metadata: { name: authentik, namespace: app-authentik }
spec:
  selector: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: server }
  ports:
    - { name: http, port: 9000, targetPort: http }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: authentik-server, namespace: app-authentik }
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: server }
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: server }
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.5@sha256:28166f077dae24371c59a644e4319ea173d5290613386462e8172a963bd607fd
          args: [server]
          envFrom:
            - secretRef: { name: authentik-runtime }
          env:
            - { name: AUTHENTIK_POSTGRESQL__HOST, value: postgresql }
            - { name: AUTHENTIK_POSTGRESQL__USER, value: authentik }
            - { name: AUTHENTIK_POSTGRESQL__NAME, value: authentik }
            - { name: AUTHENTIK_REDIS__HOST, value: valkey }
            - { name: AUTHENTIK_ERROR_REPORTING__ENABLED, value: "false" }
          ports:
            - { name: http, containerPort: 9000 }
          readinessProbe:
            httpGet: { path: /-/health/ready/, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec: { command: [ak, healthcheck] }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: 150m, memory: 384Mi }
            limits: { cpu: "1", memory: 1536Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: media, mountPath: /media }
            - { name: blueprint, mountPath: /blueprints/custom, readOnly: true }
      volumes:
        - name: media
          persistentVolumeClaim: { claimName: authentik-media }
        - name: blueprint
          secret: { secretName: authentik-blueprint }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: authentik-worker, namespace: app-authentik }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: worker }
  template:
    metadata:
      labels: { app.kubernetes.io/name: authentik, app.kubernetes.io/component: worker }
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2026.5@sha256:28166f077dae24371c59a644e4319ea173d5290613386462e8172a963bd607fd
          args: [worker]
          envFrom:
            - secretRef: { name: authentik-runtime }
          env:
            - { name: AUTHENTIK_POSTGRESQL__HOST, value: postgresql }
            - { name: AUTHENTIK_POSTGRESQL__USER, value: authentik }
            - { name: AUTHENTIK_POSTGRESQL__NAME, value: authentik }
            - { name: AUTHENTIK_REDIS__HOST, value: valkey }
            - { name: AUTHENTIK_ERROR_REPORTING__ENABLED, value: "false" }
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits: { cpu: "1", memory: 1536Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          volumeMounts:
            - { name: media, mountPath: /media }
            - { name: blueprint, mountPath: /blueprints/custom, readOnly: true }
      volumes:
        - name: media
          persistentVolumeClaim: { claimName: authentik-media }
        - name: blueprint
          secret: { secretName: authentik-blueprint }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: app-authentik }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-required, namespace: app-authentik }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector: {}
        - ipBlock: { cidr: 192.168.101.0/24 }
        - ipBlock: { cidr: 10.42.0.0/16 }
  egress:
    - {}
