apiVersion: v1
kind: Namespace
metadata:
  name: app-authentik
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-authentik}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: quota, namespace: app-authentik}
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    persistentvolumeclaims: "3"
    requests.storage: 40Gi
    pods: "10"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: authentik-media, namespace: app-authentik}
spec:
  accessModes: [ReadWriteMany]
  storageClassName: public-shared-bulk
  resources:
    requests: {storage: 10Gi}
---
apiVersion: v1
kind: Service
metadata: {name: postgresql, namespace: app-authentik}
spec:
  selector: {app.kubernetes.io/name: authentik-postgresql}
  ports:
  - {name: postgresql, port: 5432, targetPort: postgresql}
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: postgresql, namespace: app-authentik}
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: authentik-postgresql}
  template:
    metadata:
      labels: {app.kubernetes.io/name: authentik-postgresql}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      securityContext: {fsGroup: 70, fsGroupChangePolicy: OnRootMismatch}
      containers:
      - name: postgresql
        image: 
          docker.io/library/postgres:17-alpine@sha256:0a8a1e76503c091f0feb387d51b10fcd746c2d61cf6cdd6e8356973a45e40a0f
        ports:
        - {name: postgresql, containerPort: 5432}
        env:
        - {name: POSTGRES_DB, value: authentik}
        - {name: POSTGRES_USER, value: authentik}
        - name: POSTGRES_PASSWORD
          valueFrom: {secretKeyRef: {name: authentik-runtime, key: POSTGRES_PASSWORD}}
        - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
        readinessProbe:
          exec: {command: [pg_isready, -U, authentik]}
          initialDelaySeconds: 5
        livenessProbe:
          exec: {command: [pg_isready, -U, authentik]}
          initialDelaySeconds: 30
        resources:
          requests: {cpu: 100m, memory: 256Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
          runAsUser: 70
          runAsGroup: 70
        volumeMounts:
        - {name: data, mountPath: /var/lib/postgresql/data}
  volumeClaimTemplates:
  - metadata: {name: data}
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: local-path
      resources:
        requests: {storage: 20Gi}
---
apiVersion: v1
kind: Service
metadata: {name: authentik, namespace: app-authentik}
spec:
  selector: {app.kubernetes.io/name: authentik, app.kubernetes.io/component: server}
  ports:
  - {name: http, port: 9000, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: authentik-server, namespace: app-authentik}
spec:
  # Single replica: the backing Postgres + Valkey are single-replica on host-1
  # (local-path storage, no failover), so extra server replicas cannot make the
  # stack survive a node loss — they'd only add a false sense of HA. A rollout
  # briefly interrupts SSO, which is acceptable for this dev cluster.
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: authentik, app.kubernetes.io/component: server}
  template:
    metadata:
      labels: {app.kubernetes.io/name: authentik, app.kubernetes.io/component: server}
    spec:
      # Co-located with Postgres + Valkey on the control-plane node: DB and cache
      # are single-replica on host-1 (local-path, no failover), so pinning the
      # server here means only ONE node's uptime matters instead of two.
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: authentik
        image: ghcr.io/goauthentik/server:2026.5@sha256:28166f077dae24371c59a644e4319ea173d5290613386462e8172a963bd607fd
        args: [server]
        envFrom:
        - secretRef: {name: authentik-runtime}
        env:
        - {name: AUTHENTIK_POSTGRESQL__HOST, value: postgresql}
        - {name: AUTHENTIK_POSTGRESQL__USER, value: authentik}
        - {name: AUTHENTIK_POSTGRESQL__NAME, value: authentik}
        - {name: AUTHENTIK_REDIS__HOST, value: valkey.app-valkey.svc.cluster.local}
        - {name: AUTHENTIK_ERROR_REPORTING__ENABLED, value: "false"}
        ports:
        - {name: http, containerPort: 9000}
        readinessProbe:
          httpGet: {path: /-/health/ready/, port: http}
          initialDelaySeconds: 20
          periodSeconds: 10
        # On a fresh database the first pod runs all migrations before serving.
        # The startupProbe suspends the liveness probe until readiness passes, so
        # a slow first-boot migration (minutes on constrained CPU) is not killed
        # mid-flight and left in a lock-contention crash loop. 60×10s = up to 10min.
        startupProbe:
          httpGet: {path: /-/health/ready/, port: http}
          periodSeconds: 10
          failureThreshold: 60
          timeoutSeconds: 5
        livenessProbe:
          exec: {command: [ak, healthcheck]}
          initialDelaySeconds: 60
          periodSeconds: 30
          # `ak healthcheck` forks a Python process; the default 1s timeout always
          # expires under load and SIGTERMs the server into a crash loop.
          timeoutSeconds: 10
          failureThreshold: 5
        resources:
          requests: {cpu: 150m, memory: 384Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: media, mountPath: /media}
        - {name: blueprint, mountPath: /blueprints/custom, readOnly: true}
      volumes:
      - name: media
        persistentVolumeClaim: {claimName: authentik-media}
      - name: blueprint
        secret: {secretName: authentik-blueprint}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: authentik-worker, namespace: app-authentik}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: authentik, app.kubernetes.io/component: worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: authentik, app.kubernetes.io/component: worker}
    spec:
      # Same node as the server + DB + cache (see server deployment above).
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: authentik
        image: ghcr.io/goauthentik/server:2026.5@sha256:28166f077dae24371c59a644e4319ea173d5290613386462e8172a963bd607fd
        args: [worker]
        envFrom:
        - secretRef: {name: authentik-runtime}
        env:
        - {name: AUTHENTIK_POSTGRESQL__HOST, value: postgresql}
        - {name: AUTHENTIK_POSTGRESQL__USER, value: authentik}
        - {name: AUTHENTIK_POSTGRESQL__NAME, value: authentik}
        - {name: AUTHENTIK_REDIS__HOST, value: valkey.app-valkey.svc.cluster.local}
        - {name: AUTHENTIK_ERROR_REPORTING__ENABLED, value: "false"}
        resources:
          requests: {cpu: 100m, memory: 384Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: media, mountPath: /media}
        - {name: blueprint, mountPath: /blueprints/custom, readOnly: true}
      volumes:
      - name: media
        persistentVolumeClaim: {claimName: authentik-media}
      - name: blueprint
        secret: {secretName: authentik-blueprint}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-authentik}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-authentik}
spec:
  endpointSelector: {}
  ingress:
  # Public HTTP edge is the Envoy Gateway. Its proxies run hostNetwork on the
  # gateway nodes, so Cilium sees them as host / remote-node (not a
  # reserved:ingress identity).
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '9000'
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-authentik
    toPorts:
    - ports:
      - port: '5432'
        protocol: TCP
      - port: '9000'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-authentik
    toPorts:
    - ports:
      - port: '5432'
        protocol: TCP
      - port: '9000'
        protocol: TCP
  # Shared cache moved to its own app (app-valkey).
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-valkey
    toPorts:
    - ports:
      - port: '6379'
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: authentik, namespace: app-authentik}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [authentik.dev5.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: authentik, port: 9000}
