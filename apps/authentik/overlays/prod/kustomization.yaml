apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay. Es enthält nur das Namespace-Umgebungslabel und den öffentlichen
# HTTPRoute-Hostnamen ohne das Dev-Generationssegment.
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-authentik
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  - target:
      kind: HTTPRoute
      name: authentik
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: authentik.sedware.net
