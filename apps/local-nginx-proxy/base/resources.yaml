apiVersion: v1
kind: Namespace
metadata:
  name: app-local-nginx-proxy
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
---
# Public edge entry for the LOCAL cluster's nginx test server.
#
# The local cluster has no public NIC (LAN + NetBird only); the public cluster is
# the only internet edge. `local-nginx.dev5.sedware.net` is published HERE and
# re-encrypted to the LOCAL Envoy edge over NetBird — the same public->local
# pattern Mail Edge uses for SMTP, but HTTPS end-to-end:
#
#   Internet ─▶ public Envoy edge (TLS, *.dev5 wildcard, host local-nginx.dev5)
#            ─▶ URLRewrite Host: local-nginx.local.dev5.sedware.net
#            ─▶ Backend local-edge (dev-manager.nb.dev5.sedware.net:443) + origin TLS
#            ─▶ (NetBird) local Envoy edge :443 (terminates *.local.dev5 wildcard)
#            ─▶ local HTTPRoute host local-nginx.local.dev5 ─▶ local-nginx ClusterIP
#
# No LAN IP, no Cilium LB VIP, no manual LAN EndpointSlice: the origin is the
# stable NetBird peer FQDN, resolved to the current overlay IPv4 by CoreDNS
# (*.nb.dev5 forward). TLS is verified end-to-end against the local wildcard cert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: local-nginx, namespace: app-local-nginx-proxy}
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [local-nginx.dev5.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      filters:
        # Rewrite Host so the local edge selects its *.local.dev5 wildcard
        # listener + the local-nginx HTTPRoute; also the SNI verified below.
        - type: URLRewrite
          urlRewrite:
            hostname: local-nginx.local.dev5.sedware.net
      backendRefs:
        # Port comes from the Backend endpoint (443); no port field here.
        - {group: gateway.envoyproxy.io, kind: Backend, name: local-edge}
---
# Origin: the LOCAL Private Edge (dev-manager), reached over NetBird by its stable
# peer FQDN. CoreDNS resolves it to the current overlay IPv4 at runtime — never a
# raw per-generation overlay IP, LAN IP, or Cilium LB VIP.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata: {name: local-edge, namespace: app-local-nginx-proxy}
spec:
  endpoints:
    - fqdn: {hostname: dev-manager.nb.dev5.sedware.net, port: 443}
---
# Re-encrypt to the local edge and verify its Let's-Encrypt *.local.dev5 wildcard.
# hostname is both the SNI presented (selects the wildcard listener) and the name
# checked against the cert SANs. LE production chains to ISRG Root X1 (publicly
# trusted) → the proxy's System trust store, no CA bundle to ship.
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata: {name: local-edge-tls, namespace: app-local-nginx-proxy}
spec:
  targetRefs:
    - {group: gateway.envoyproxy.io, kind: Backend, name: local-edge}
  validation:
    hostname: local-nginx.local.dev5.sedware.net
    wellKnownCACertificates: System
