# Public-Edge-Eintrag für den nginx-Testserver des lokalen Clusters.
#
# Der lokale Cluster besitzt keine öffentliche NIC; der Public-Cluster ist der
# einzige Internet-Edge. `local-nginx.dev10.sedware.net` wird hier veröffentlicht
# und über NetBird zum lokalen Envoy Edge re-encrypted. Das entspricht dem
# Public-zu-Local-Muster des Mail Edge, hier jedoch mit Ende-zu-Ende-HTTPS:
#
#   Internet ─▶ public Envoy edge (TLS, *.dev10 wildcard, host local-nginx.dev10)
#            ─▶ URLRewrite Host: local-nginx.local.dev10.sedware.net
#            ─▶ Backend local-edge (dev-manager.nb.dev10.sedware.net:443) + origin TLS
#            ─▶ (NetBird) local Envoy edge :443 (terminates *.local.dev10 wildcard)
#            ─▶ local HTTPRoute host local-nginx.local.dev10 ─▶ local-nginx ClusterIP
#
# Weder LAN-IP, Cilium-LB-VIP noch manuelle EndpointSlice werden benötigt. Der
# stabile NetBird-Peer-FQDN wird durch CoreDNS auf die aktuelle Overlay-IPv4
# aufgelöst; TLS wird Ende-zu-Ende gegen das lokale Wildcard-Zertifikat geprüft.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: local-nginx, namespace: app-local-nginx-proxy}
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [local-nginx.dev10.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      filters:
        # Der umgeschriebene Host wählt am lokalen Edge den Wildcard-Listener und
        # die local-nginx-HTTPRoute; derselbe Name dient unten als SNI.
        - type: URLRewrite
          urlRewrite:
            hostname: local-nginx.local.dev10.sedware.net
      backendRefs:
        # Port 443 kommt vom Backend-Endpunkt; hier steht deshalb kein Portfeld.
        - {group: gateway.envoyproxy.io, kind: Backend, name: local-edge}
---
# Origin ist der Local Private Edge auf dev-manager, erreichbar über dessen
# stabilen NetBird-Peer-FQDN. CoreDNS löst ihn zur Laufzeit auf die aktuelle
# Overlay-IPv4 auf, nie auf eine hartkodierte Overlay-, LAN- oder LB-VIP.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata: {name: local-edge, namespace: app-local-nginx-proxy}
spec:
  endpoints:
    - fqdn: {hostname: dev-manager.nb.dev10.sedware.net, port: 443}
---
# Re-encryption zum lokalen Edge mit Prüfung des Let's-Encrypt-Wildcards.
# hostname ist sowohl das präsentierte SNI als auch der gegen die SANs geprüfte
# Name. Die öffentliche Chain bis ISRG Root X1 liegt im System-Truststore; ein
# eigenes CA-Bundle ist nicht erforderlich.
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata: {name: local-edge-tls, namespace: app-local-nginx-proxy}
spec:
  targetRefs:
    - {group: gateway.envoyproxy.io, kind: Backend, name: local-edge}
  validation:
    hostname: local-nginx.local.dev10.sedware.net
    wellKnownCACertificates: System
