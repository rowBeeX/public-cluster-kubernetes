apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay. Es enthält ausschließlich das Namespace-Umgebungslabel und die
# Hostnamen ohne das generationsgebundene Segment `dev10.`: Public Edge,
# umgeschriebener Local Edge und NetBird-Origin-Peer-FQDN.
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-local-nginx-proxy
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  - target:
      kind: HTTPRoute
      name: local-nginx
    patch: |
      - op: replace
        path: /spec/hostnames/0
        value: local-nginx.sedware.net
      - op: replace
        path: /spec/rules/0/filters/0/urlRewrite/hostname
        value: local-nginx.local.sedware.net
  - target:
      kind: Backend
      name: local-edge
    patch: |
      - op: replace
        path: /spec/endpoints/0/fqdn/hostname
        value: dev-manager.nb.sedware.net
  - target:
      kind: BackendTLSPolicy
      name: local-edge-tls
    patch: |
      - op: replace
        path: /spec/validation/hostname
        value: local-nginx.local.sedware.net
