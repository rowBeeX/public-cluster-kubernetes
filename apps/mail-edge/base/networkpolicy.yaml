# Default-Deny: Kommunikation ist nur über die folgenden Policies erlaubt.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-mailedge}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
# DNS wird für die MX-/A-Auflösung bei ausgehender Zustellung benötigt.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-dns-egress, namespace: app-mailedge}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - {protocol: UDP, port: '53'}
      - {protocol: TCP, port: '53'}
      rules:
        dns:
        - matchPattern: '*'
---
# Mail-Flows des Postfix-Edge-Pods. Öffentliche Login-Ports wie IMAP, JMAP,
# ManageSieve oder Submission werden niemals geöffnet.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-mail-flows, namespace: app-mailedge}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: mail-edge}
  ingress:
  # Der private :2525-Listener läuft als hostNetwork-Envoy. Am Backend erscheint
  # deshalb die Host-/Remote-Node-Identity; Postfix begrenzt den Relay-Trust
  # zusätzlich auf das einzelne PodCIDR des vorgesehenen Gateway-Nodes.
  - fromEntities: [host, remote-node]
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  # Eingehendes MX: Das öffentliche Internet darf auf :25 zustellen.
  - fromEntities: [world]
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  egress:
  # Ausgehende Zustellung an Internet-MX-Hosts auf :25.
  - toEntities: [world]
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  # Eingehende Nachrichten für dev13.sedware.net über den mail-smtp-Listener des
  # Local Private Edge an Stalwart weiterleiten. Der Peer-FQDN des Dev-Managers
  # wird bei der Zustellung zur aktuellen Overlay-IP aufgelöst. Da Cilium keine
  # pro Verbindung aufgelöste IP abgleichen kann, bleibt das Ziel-CIDR stabil.
  - toCIDRSet:
    - cidr: 100.64.0.0/10
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
