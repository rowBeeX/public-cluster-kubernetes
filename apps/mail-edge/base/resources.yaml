apiVersion: v1
kind: Namespace
metadata:
  name: app-mailedge
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    # Baseline enforce / restricted audit+warn (same posture as app-netbird).
    # Postfix's master process requires uid 0 to manage its privilege-separated
    # children and spool ownership, so restricted is not achievable; baseline is
    # the enforced level.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-mailedge}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: quota, namespace: app-mailedge}
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    requests.storage: 5Gi
    persistentvolumeclaims: "1"
    pods: "4"
---
# STARTTLS / implicit-TLS certificate for the SMTP edge. DNS-01 via the shared
# letsencrypt-dev ClusterIssuer (Cloudflare). This is a dedicated cert in this
# namespace — the gateway-system wildcard secret is NOT reused cross-namespace.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: {name: mail-edge-tls, namespace: app-mailedge}
spec:
  secretName: mail-edge-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-dev
  dnsNames:
    - mail.dev4.sedware.net
---
# Durable queue spool. A mail relay defers mail for temporarily-unreachable
# destinations, so the Postfix queue (/var/spool/postfix) must survive pod
# restarts -> single replica + RWO PVC (a Postfix spool cannot be shared).
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: mail-edge-spool, namespace: app-mailedge}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests: {storage: 2Gi}
---
# Inbound SMTP edge. Same "no host proxy" L4 pattern as netbird-stun: the public
# gateway-node IPs are set as externalIPs and Cilium announces the Service
# directly. This is the ONLY public mail entry/exit. NOT routed via the Envoy
# Gateway (that listener is HTTP-only).
# On IP changes this list must be updated manually.
apiVersion: v1
kind: Service
metadata: {name: mail-edge-smtp, namespace: app-mailedge}
spec:
  selector: {app.kubernetes.io/name: mail-edge}
  externalIPs: [192.168.101.10, 192.168.101.11]
  ports:
  - {name: smtp, protocol: TCP, port: 25, targetPort: smtp}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-edge
  namespace: app-mailedge
  labels: {app.kubernetes.io/name: mail-edge}
spec:
  # Single replica: the Postfix queue is stateful (see PVC above). Recreate to
  # avoid two Postfix instances writing the same spool during a rollout.
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app.kubernetes.io/name: mail-edge}
  template:
    metadata:
      labels: {app.kubernetes.io/name: mail-edge}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: postfix
        # No digest pinned: could not verify one offline. Pin @sha256:... to
        # match the repo convention before merge (tag tracks the image release).
        image: docker.io/boky/postfix:v4.4.0@sha256:f3f247fd42528b969e2603ac120d5a5b5db7dfe61f4505c49d438b9ba1822999
        env:
        # Recipient-restricted relay: senders are unrestricted (needed so the
        # public internet can submit inbound MX mail), authorization is by
        # recipient (relay_domains) and by source network (mynetworks) below.
        - {name: ALLOW_EMPTY_SENDER_DOMAINS, value: "true"}
        - {name: POSTFIX_myhostname, value: mail.dev4.sedware.net}
        - {name: POSTFIX_inet_protocols, value: ipv4}
        # This box is final destination for NO domain (dev4 is a *relay* domain,
        # delivered onward to the Local Stalwart backend, not a local mailbox).
        - {name: POSTFIX_mydestination, value: ""}
        # --- Inbound: Internet :25 -> Mail Edge -> Local Stalwart -------------
        # Accept inbound mail addressed to dev4.sedware.net ...
        - {name: POSTFIX_relay_domains, value: dev4.sedware.net}
        # ... and forward it to the Local Stalwart backend over NetBird via the
        # Local Private Edge (Envoy) mail-smtp listener. The [host] brackets
        # disable MX lookup (deliver straight to that address); Postfix still
        # resolves the peer FQDN to its current overlay IP at delivery time
        # (CoreDNS forwards *.nb.dev4 to AdGuard). The stable peer FQDN — never a
        # raw per-generation overlay IP — is the GitOps source of truth.
        # dev-manager.nb.dev4.sedware.net: the Local Private Edge (dev-manager)
        # NetBird peer; its :25 TCPRoute forwards to the Stalwart ClusterIP.
        - name: POSTFIX_transport_maps
          value: "inline:{ dev4.sedware.net=smtp:[dev-manager.nb.dev4.sedware.net]:25 }"
        # --- Outbound: Local Stalwart -> Mail Edge -> Internet :25 ------------
        # ONLY the Local Stalwart peer may relay to arbitrary (internet)
        # destinations. Everything else may only reach relay_domains. This is the
        # anti-open-relay gate. Overrides boky's default private-range mynetworks.
        # Source is the Local Stalwart reaching mail-edge over the NetBird overlay.
        # Relay (outbound to internet) permitted only from the NetBird overlay
        # (the Local Stalwart, reaching mail-edge over NetBird). Anti-open-relay.
        - name: POSTFIX_mynetworks
          value: "100.64.0.0/10 127.0.0.0/8 [::1]/128"
        # No SASL / no public login: relaying is permit_mynetworks only.
        - {name: POSTFIX_smtpd_relay_restrictions, value: "permit_mynetworks reject_unauth_destination"}
        # STARTTLS on :25 (opportunistic) using the cert-manager certificate.
        - {name: POSTFIX_smtpd_tls_security_level, value: may}
        - {name: POSTFIX_smtpd_tls_cert_file, value: /etc/postfix/tls/tls.crt}
        - {name: POSTFIX_smtpd_tls_key_file, value: /etc/postfix/tls/tls.key}
        # Opportunistic TLS for outbound delivery to remote MX hosts.
        - {name: POSTFIX_smtp_tls_security_level, value: may}
        ports:
        - {name: smtp, containerPort: 25, protocol: TCP}
        readinessProbe:
          tcpSocket: {port: smtp}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket: {port: smtp}
          initialDelaySeconds: 20
          periodSeconds: 30
        resources:
          requests: {cpu: 100m, memory: 128Mi}
        securityContext:
          # Postfix master must run as uid 0 (privilege-separated design); it
          # keeps the runtime default capability set (SETUID/SETGID/CHOWN/... )
          # which is baseline-compliant. No extra caps are ADDED, no privileged
          # mode, no host namespaces. runAsNonRoot/restricted is not achievable
          # for the Postfix master.
          allowPrivilegeEscalation: false
          seccompProfile: {type: RuntimeDefault}
        volumeMounts:
        - {name: spool, mountPath: /var/spool/postfix}
        - {name: tls, mountPath: /etc/postfix/tls, readOnly: true}
      volumes:
      - name: spool
        persistentVolumeClaim: {claimName: mail-edge-spool}
      - name: tls
        secret: {secretName: mail-edge-tls}
---
# Default-deny: nothing in this namespace talks to anything unless explicitly
# allowed by the policies below.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-mailedge}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
# DNS is required so Postfix can resolve MX/A records for outbound delivery.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-dns-egress, namespace: app-mailedge}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - {protocol: UDP, port: '53'}
      - {protocol: TCP, port: '53'}
      rules:
        dns:
        - matchPattern: '*'
---
# The mail flows for the Postfix edge pod. NO public login ports (no
# IMAP/JMAP/ManageSieve/Submission) are ever opened.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-mail-flows, namespace: app-mailedge}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: mail-edge}
  ingress:
  # Inbound MX: the public internet may deliver mail on :25.
  - fromEntities: [world]
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  # Outbound relay ingress: the Local Stalwart NetBird peer submits outbound
  # mail on the same :25 listener. NOTE: Cilium classifies NetBird (CGNAT)
  # peers as `world`, so at L3 this rule is a subset of the world rule above;
  # the actual "relay only from the Local Stalwart peer" boundary is enforced
  # by Postfix `mynetworks` (100.64.0.0/10). This rule documents the source:
  # the Local Stalwart reaching mail-edge over NetBird.
  - fromCIDRSet:
    - cidr: 100.64.0.0/10
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  egress:
  # Outbound delivery to the internet (MX hosts) on :25.
  - toEntities: [world]
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
  # Inbound forward: deliver dev4.sedware.net mail to the Local Stalwart backend
  # over NetBird on :25, via the Local Private Edge (Envoy) mail-smtp listener.
  # The Local Private Edge (dev-manager) is reached at its NetBird overlay IP,
  # resolved at delivery time from dev-manager.nb.dev4.sedware.net. Cilium cannot
  # match a per-connection resolved IP, so allow the stable NetBird overlay CIDR
  # on :25 (same range the inbound rule already trusts).
  - toCIDRSet:
    - cidr: 100.64.0.0/10
    toPorts:
    - ports:
      - {protocol: TCP, port: '25'}
