# STARTTLS-Zertifikat für den SMTP-Edge per DNS-01 und gemeinsamem
# letsencrypt-dev-ClusterIssuer. Das dedizierte Namespace-Zertifikat vermeidet
# eine clusterübergreifende Wiederverwendung des gateway-system-Wildcard-Secrets.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: {name: mail-edge-tls, namespace: app-mailedge}
spec:
  secretName: mail-edge-tls
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-dev
  dnsNames:
    - mail.dev10.sedware.net
    # Stalwart verbindet sich über diesen NetBird-Peer-FQDN. Der zusätzliche SAN
    # erlaubt eine vollständige STARTTLS-Prüfung ohne allowInvalidCerts-Ausnahme.
    - public-cluster-host-1.nb.dev10.sedware.net
---
# Dauerhafter Queue-Spool: Ein Mail-Relay stellt bei vorübergehend unerreichbaren
# Zielen zurück. Die Postfix-Queue muss Pod-Restarts überstehen, daher ein
# einzelnes Replica mit RWO-PVC; ein Postfix-Spool darf nicht geteilt werden.
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: mail-edge-spool, namespace: app-mailedge}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests: {storage: 2Gi}
---
# Öffentlicher SMTP-Eingang über Cilium Node IPAM auf den Gateway-Node-Adressen.
# Dies ist der einzige Internet-Mail-Ein-/Ausgang; Envoy bedient separat nur den
# privaten Smarthost-Port :2525 über NetBird.
apiVersion: v1
kind: Service
metadata:
  name: mail-edge-smtp
  namespace: app-mailedge
  annotations:
    io.cilium.nodeipam/match-node-labels: gateway.sedware.net/enabled=true
spec:
  selector: {app.kubernetes.io/name: mail-edge}
  type: LoadBalancer
  loadBalancerClass: io.cilium/node
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: Cluster
  ports:
  - {name: smtp, protocol: TCP, port: 25, targetPort: smtp}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-edge
  namespace: app-mailedge
  labels: {app.kubernetes.io/name: mail-edge}
spec:
  # Ein Replica, da die Postfix-Queue zustandsbehaftet ist. Recreate verhindert,
  # dass während eines Rollouts zwei Instanzen denselben Spool beschreiben.
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app.kubernetes.io/name: mail-edge}
  template:
    metadata:
      labels: {app.kubernetes.io/name: mail-edge}
    spec:
      automountServiceAccountToken: false
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: postfix
        image: docker.io/boky/postfix:v5.1.0-ubuntu@sha256:aa8c9f080be251f833faf7b333eb75381dc8c840d31e3b7e0c93a0a48e27608a
        env:
        # Empfängerbegrenztes Relay: Internet-MX-Absender bleiben zulässig;
        # relay_domains und mynetworks autorisieren Empfänger beziehungsweise Quelle.
        - {name: ALLOW_EMPTY_SENDER_DOMAINS, value: "true"}
        - {name: POSTFIX_myhostname, value: mail.dev10.sedware.net}
        - {name: POSTFIX_inet_protocols, value: ipv4}
        # Dieser Host ist für keine Domain das Endziel. dev10 ist eine Relay-Domain,
        # die an Stalwart weitergeleitet wird, keine lokale Mailbox-Domain.
        - {name: POSTFIX_mydestination, value: ""}
        # --- Eingehend: Internet :25 -> Mail Edge -> Local Stalwart -----------
        # Nachrichten an dev10.sedware.net annehmen ...
        - {name: POSTFIX_relay_domains, value: dev10.sedware.net}
        # ... und über den mail-smtp-Listener des Local Private Edge an Stalwart
        # weiterleiten. Eckige Klammern deaktivieren die MX-Auflösung; Postfix
        # löst den stabilen Peer-FQDN bei jeder Zustellung zur aktuellen Overlay-
        # IP auf. Dieser FQDN statt einer rohen Overlay-IP ist die GitOps-Quelle.
        # Der :25-TCPRoute am Dev-Manager führt zum Stalwart-ClusterIP.
        - name: POSTFIX_transport_maps
          value: "inline:{ dev10.sedware.net=smtp:[dev-manager.nb.dev10.sedware.net]:25 }"
        # --- Ausgehender Relay-Trust (Anti-Open-Relay-Gate) ------------------
        # mynetworks begrenzt Quellen, die an beliebige Internet-Ziele relayen
        # dürfen. Das frühere 100.64.0.0/10 hätte jedem NetBird-/CGNAT-Peer
        # vertraut und damit ein Open-Relay-Risiko erzeugt (#2/#3).
        #
        # Der Smarthost-Pfad endet am hostNetwork-Envoy auf Public Host 1. Beim
        # Zugriff auf den ClusterIP wird dessen Quelle auf die CiliumInternalIP
        # aus dem stabilen Server-Node-PodCIDR 10.42.0.0/24 umgesetzt. Nur dieses
        # /24 wird vertraut; Host 2 nutzt 10.42.1.0/24. Die CiliumNetworkPolicy
        # erlaubt am Backend zusätzlich ausschließlich host/remote-node sowie
        # den öffentlichen MX-Pfad. NetBird-Policy und Interface-Firewall
        # begrenzen den Zugang zu Envoy :2525 auf den Stalwart-Peer.
        - name: POSTFIX_mynetworks
          value: "127.0.0.0/8 [::1]/128 10.42.0.0/24"
        # Internet-MX-Sender müssen eine SMTP-Session beginnen dürfen. Die
        # Empfänger-/Relay-Autorisierung erfolgt darunter separat und verweigert
        # externe Ziele weiterhin für alle nicht vertrauenswürdigen Quellen.
        - {name: POSTFIX_smtpd_client_restrictions, value: "permit"}
        # Kein SASL und kein öffentlicher Login: Relay nur per permit_mynetworks.
        - {name: POSTFIX_smtpd_relay_restrictions, value: "permit_mynetworks reject_unauth_destination"}
        # Opportunistisches STARTTLS auf :25 mit dem cert-manager-Zertifikat.
        - {name: POSTFIX_smtpd_tls_security_level, value: may}
        - {name: POSTFIX_smtpd_tls_cert_file, value: /etc/postfix/tls/tls.crt}
        - {name: POSTFIX_smtpd_tls_key_file, value: /etc/postfix/tls/tls.key}
        # Opportunistisches TLS bei ausgehender Zustellung zu externen MX-Hosts.
        - {name: POSTFIX_smtp_tls_security_level, value: may}
        ports:
        - {name: smtp, containerPort: 25, protocol: TCP}
        readinessProbe:
          tcpSocket: {port: smtp}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket: {port: smtp}
          initialDelaySeconds: 20
          periodSeconds: 30
        resources:
          requests: {cpu: 100m, memory: 128Mi}
        securityContext:
          # Der privilege-separierte Postfix-Master benötigt UID 0; außerdem
          # erzeugt das boky-Image /etc/postfix beim Start neu. runAsNonRoot und
          # readOnlyRootFilesystem sind daher nicht erreichbar (siehe Exceptions).
          # #11: Alle Capabilities entfernen und nur tatsächlich benötigte wieder
          # ergänzen; NET_RAW, MKNOD, AUDIT_WRITE, SETFCAP, SETPCAP und FSETID entfallen.
          allowPrivilegeEscalation: false
          seccompProfile: {type: RuntimeDefault}
          capabilities:
            drop: [ALL]
            add:
            - CHOWN            # Eigentümer von Spool-/Queue-Dateien anpassen
            - DAC_OVERRIDE     # Root-Master greift auf Postfix-Spool zu
            - FOWNER           # Berechtigungen von Spool-/Queue-Dateien verwalten
            - SETGID           # Child-Prozesse auf postfix/postdrop-Gruppen absenken
            - SETUID           # Privilege-separierte Daemons auf postfix-User absenken
            - NET_BIND_SERVICE # Port :25 binden
            - KILL             # Child-Daemons signalisieren
            - SYS_CHROOT       # smtpd-/cleanup-Daemons in chroot ausführen
        volumeMounts:
        - {name: spool, mountPath: /var/spool/postfix}
        - {name: tls, mountPath: /etc/postfix/tls, readOnly: true}
      volumes:
      - name: spool
        persistentVolumeClaim: {claimName: mail-edge-spool}
      - name: tls
        secret: {secretName: mail-edge-tls}
