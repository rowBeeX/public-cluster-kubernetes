apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay: Nur umgebungsspezifische Werte stehen hier. Prod-Hostnames
# enthalten kein dev10-Segment; der Namespace trägt das Prod-Environment-Label.
resources:
  - ../../base

patches:
  # Namespace-Environment-Label von Dev auf Prod umstellen.
  - target:
      kind: Namespace
      name: app-mailedge
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  # STARTTLS-Zertifikat des SMTP-Edge auf Prod-Hostnames umstellen.
  - target:
      kind: Certificate
      name: mail-edge-tls
    patch: |
      - op: replace
        path: /spec/dnsNames/0
        value: mail.sedware.net
      - op: replace
        path: /spec/dnsNames/1
        value: public-cluster-host-1.nb.sedware.net
  # Postfix-Env: Prod-Hostname, Relay-Domain und Weitertransport zu Stalwart ohne
  # dev10-Segment. Strategic-Merge über den Env-Namen (Merge-Key `name`): jeder
  # Eintrag wird an Ort und Stelle aktualisiert, die Base-Reihenfolge bleibt
  # unberührt — auch wenn in der Base später Env-Variablen ergänzt werden.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mail-edge
        namespace: app-mailedge
      spec:
        template:
          spec:
            containers:
              - name: postfix
                env:
                  - name: POSTFIX_myhostname
                    value: mail.sedware.net
                  - name: POSTFIX_relay_domains
                    value: sedware.net
                  - name: POSTFIX_transport_maps
                    value: "inline:{ sedware.net=smtp:[beelink-server.nb.sedware.net]:25 }"
