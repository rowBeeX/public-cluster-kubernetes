apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay: Nur umgebungsspezifische Werte stehen hier. Prod-Hostnames
# enthalten kein dev8-Segment; der Namespace trägt das Prod-Environment-Label.
resources:
  - ../../base

patches:
  # Namespace-Environment-Label von Dev auf Prod umstellen.
  - target:
      kind: Namespace
      name: app-mailedge
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  # STARTTLS-Zertifikat des SMTP-Edge auf Prod-Hostnames umstellen.
  - target:
      kind: Certificate
      name: mail-edge-tls
    patch: |
      - op: replace
        path: /spec/dnsNames/0
        value: mail.sedware.net
      - op: replace
        path: /spec/dnsNames/1
        value: public-cluster-host-1.nb.sedware.net
  # Postfix-Env: Prod-Hostname, Relay-Domain und Weitertransport zu Stalwart ohne
  # dev8-Segment. Per Env-Index ersetzen, um die Listenreihenfolge zu bewahren;
  # Strategic-Merge würde die Einträge umsortieren.
  - target:
      kind: Deployment
      name: mail-edge
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: mail.sedware.net
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: sedware.net
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "inline:{ sedware.net=smtp:[dev-manager.nb.sedware.net]:25 }"
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: "127.0.0.0/8 [::1]/128 203.0.113.10/32"
