apiVersion: v1
kind: Namespace
metadata:
  name: app-netbird
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: platform
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.36
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.36
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.36
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-netbird}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: quota, namespace: app-netbird}
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    requests.storage: 20Gi
    persistentvolumeclaims: "2"
    pods: "8"
