apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress:
  # Dashboard / Management API / Signal gRPC arrive via the Envoy Gateway, whose
  # hostNetwork proxies present as host / remote-node (was reserved:ingress).
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
  # STUN stays a protocol-specific edge path straight from the internet (§9).
  - fromEntities:
    - world
    toPorts:
    - ports:
      - port: '3478'
        protocol: UDP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-netbird
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
      - port: '9090'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  # netbird-server validates the Authentik OIDC issuer through the second
  # host-network Gateway node selected by split-horizon DNS.
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '443'
        protocol: TCP
---
# Edge ingress for the relay. Envoy proxies run hostNetwork, so Cilium sees the
# terminated edge traffic as reserved:host / reserved:remote-node (same pattern
# as allow-required-cilium-flows). default-deny + the namespace-wide egress DNS
# rule in allow-required-cilium-flows already cover this pod; this policy only
# opens the relay's WebSocket port to the Gateway nodes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-relay-edge-ingress, namespace: app-netbird}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: netbird-relay}
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '33080'
        protocol: TCP
