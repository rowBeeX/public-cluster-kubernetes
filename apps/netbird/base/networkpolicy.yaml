apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress:
  # Dashboard, Management API und Signal-gRPC kommen über die hostNetwork-
  # Proxies des Envoy Gateways und erscheinen als host/remote-node.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
  # STUN bleibt ein protokollspezifischer direkter Edge-Pfad aus dem Internet.
  - fromEntities:
    - world
    toPorts:
    - ports:
      - port: '3478'
        protocol: UDP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-netbird
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
      - port: '9090'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  # netbird-server validiert den Authentik-OIDC-Issuer über den zweiten, durch
  # Split-Horizon-DNS ausgewählten hostNetwork-Gateway-Node.
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '443'
        protocol: TCP
---
# Edge-Ingress für den Relay. Cilium sieht den terminierten Traffic der
# hostNetwork-Envoy-Proxies als host/remote-node. Default-Deny und die
# namespaceweite DNS-Egress-Regel gelten bereits; diese Policy öffnet nur den
# WebSocket-Port des Relays für die Gateway-Nodes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-relay-edge-ingress, namespace: app-netbird}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: netbird-relay}
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '33080'
        protocol: TCP
