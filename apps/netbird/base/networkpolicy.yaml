apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-netbird}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress:
  # Dashboard, Management API und Signal-gRPC kommen über die hostNetwork-
  # Proxies des Envoy Gateways und erscheinen als host/remote-node.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
  # STUN bleibt ein protokollspezifischer direkter Edge-Pfad aus dem Internet.
  - fromEntities:
    - world
    toPorts:
    - ports:
      - port: '3478'
        protocol: UDP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-netbird
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
      - port: '9090'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  # netbird-server validiert den Authentik-OIDC-Issuer über den zweiten, durch
  # Split-Horizon-DNS ausgewählten hostNetwork-Gateway-Node.
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '443'
        protocol: TCP
