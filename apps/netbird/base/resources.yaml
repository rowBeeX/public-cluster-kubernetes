apiVersion: v1
kind: Namespace
metadata:
  name: app-netbird
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-netbird}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
---
apiVersion: v1
kind: ResourceQuota
metadata: {name: quota, namespace: app-netbird}
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    requests.storage: 20Gi
    persistentvolumeclaims: "2"
    pods: "8"
---
apiVersion: v1
kind: Service
metadata: {name: netbird-server, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-server}
  ports:
  - {name: http, port: 80, targetPort: http, appProtocol: kubernetes.io/h2c}
  - {name: metrics, port: 9090, targetPort: metrics}
---
apiVersion: v1
kind: Service
metadata: {name: netbird-stun, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-server}
  # externalIPs sind die öffentlichen Gateway-Node-IPs; Cilium annonciert den
  # UDP-Service direkt und benötigt dafür keinen Host-Proxy.
  # Bei IP-Änderungen muss dieser Wert manuell aktualisiert werden.
  externalIPs: [192.168.101.10, 192.168.101.11]
  ports:
  - {name: stun, protocol: UDP, port: 3478, targetPort: stun}
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: netbird-server, namespace: app-netbird}
spec:
  serviceName: netbird-server
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-server}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-server}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: netbird-server
        image: 
          docker.io/netbirdio/netbird-server:0.72.4@sha256:9ab98a37002517204010ee88a0c7f5e76b1fe6e2a736043db60efb7a02fbded3
        args: [--config, /etc/netbird/config.yaml]
        env:
        - {name: NB_DISABLE_GEOLOCATION, value: "true"}
        - {name: NB_PEER_UPDATE_INTERVAL_MS, value: "1"}
        - {name: NB_PEER_UPDATE_STARTUP_PERIOD_S, value: "1"}
        ports:
        - {name: http, containerPort: 80}
        - {name: stun, protocol: UDP, containerPort: 3478}
        - {name: metrics, containerPort: 9090}
        - {name: health, containerPort: 9000}
        readinessProbe:
          httpGet: {path: /oauth2, port: http}
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /oauth2, port: http}
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests: {cpu: 100m, memory: 256Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL], add: [NET_BIND_SERVICE]}
          readOnlyRootFilesystem: true
        volumeMounts:
        - {name: config, mountPath: /etc/netbird, readOnly: true}
        - {name: data, mountPath: /var/lib/netbird}
        - {name: tmp, mountPath: /tmp}
      volumes:
      - name: config
        secret: {secretName: netbird-config}
      - name: tmp
        emptyDir: {sizeLimit: 256Mi}
  volumeClaimTemplates:
  - metadata: {name: data}
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: local-path
      resources:
        requests: {storage: 10Gi}
---
apiVersion: v1
kind: Service
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-dashboard}
  ports:
  - {name: http, port: 80, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-dashboard}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-dashboard}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels: {app.kubernetes.io/name: netbird-dashboard}
      containers:
      - name: dashboard
        image: 
          docker.io/netbirdio/dashboard:v2.39.0@sha256:9c31fa6ea31945b05915ea989003caf07eee9afa8604c84f89abe924246fb3da
        env:
        - {name: AUTH_AUDIENCE, value: netbird-dashboard}
        - {name: AUTH_CLIENT_ID, value: netbird-dashboard}
        - {name: USE_AUTH0, value: "false"}
        - {name: AUTH_SUPPORTED_SCOPES, value: openid profile email groups}
        - {name: AUTH_REDIRECT_URI, value: /nb-auth}
        - {name: AUTH_SILENT_REDIRECT_URI, value: /nb-silent-auth}
        ports:
        - {name: http, containerPort: 80}
        readinessProbe:
          httpGet: {path: /, port: http}
          initialDelaySeconds: 5
        resources:
          requests: {cpu: 25m, memory: 64Mi}
        securityContext:
          allowPrivilegeEscalation: false
            # nginx needs CHOWN/SETUID/SETGID to drop privileges from root;
            # DAC_OVERRIDE for log file access.
          capabilities:
            drop: [ALL]
            add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID, DAC_OVERRIDE]
        volumeMounts:
        - {name: nginx-tmp, mountPath: /var/lib/nginx/tmp}
        - {name: nginx-logs, mountPath: /var/lib/nginx/logs}
        - {name: nginx-run, mountPath: /run/nginx}
      volumes:
      - name: nginx-tmp
        emptyDir: {sizeLimit: 64Mi}
      - name: nginx-logs
        emptyDir: {sizeLimit: 64Mi}
      - name: nginx-run
        emptyDir: {sizeLimit: 16Mi}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-required-cilium-flows, namespace: app-netbird}
spec:
  endpointSelector: {}
  ingress:
  # Dashboard / Management API / Signal gRPC arrive via the Envoy Gateway, whose
  # hostNetwork proxies present as host / remote-node (was reserved:ingress).
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
  # STUN stays a protocol-specific edge path straight from the internet (§9).
  - fromEntities:
    - world
    toPorts:
    - ports:
      - port: '3478'
        protocol: UDP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: app-netbird
    toPorts:
    - ports:
      - port: '80'
        protocol: TCP
      - port: '9090'
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: '53'
        protocol: UDP
      - port: '53'
        protocol: TCP
  # netbird-server validates the Authentik OIDC issuer through the second
  # host-network Gateway node selected by split-horizon DNS.
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '443'
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird.dev5.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-dashboard, port: 80}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-control-http, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-control.dev5.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-server, port: 80}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata: {name: netbird-control-grpc, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-control.dev5.sedware.net]
  rules:
  - backendRefs:
    - {name: netbird-server, port: 80}
---
# NetBird Relay (§8/§21): WebSocket relay for peers that cannot NAT-traverse.
# TLS is terminated at the Envoy Gateway (https listener, 443); the relay itself
# speaks plain HTTP/1.1 + WebSocket on a high, unprivileged port (33080), so the
# client-facing endpoint uses the rels:// (WSS) scheme via the public hostname.
apiVersion: v1
kind: Service
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-relay}
  ports:
  - {name: relay, port: 80, targetPort: relay}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-relay}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-relay}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: relay
        # Tag tracks the NetBird release; digest-pinned per repo convention.
        image: docker.io/netbirdio/relay:0.72.4@sha256:69efb9388a1f2908459757e407cdd63fc33d65751fc9e3f6749bfd4d14e5e5da
        env:
        - {name: NB_LOG_LEVEL, value: info}
        # Unprivileged listen port keeps the container Restricted-PSS compliant.
        - {name: NB_LISTEN_ADDRESS, value: ":33080"}
        # Public WSS endpoint advertised to peers by the management server.
        # Scheme rels:// = WebSocket-over-TLS (TLS terminated at the Gateway).
        - {name: NB_EXPOSED_ADDRESS, value: "rels://netbird-relay.dev5.sedware.net:443"}
        # Shared HMAC secret with the management server. Provided out-of-band via
        # the same SOPS/public-cluster-nix mechanism as the netbird-config Secret;
        # its value MUST equal management config Relay.Secret (see README).
        - name: NB_AUTH_SECRET
          valueFrom:
            secretKeyRef: {name: netbird-relay-auth, key: NB_AUTH_SECRET}
        ports:
        - {name: relay, containerPort: 33080}
        readinessProbe:
          tcpSocket: {port: relay}
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket: {port: relay}
          initialDelaySeconds: 15
          periodSeconds: 30
        resources:
          requests: {cpu: 25m, memory: 64Mi}
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
          readOnlyRootFilesystem: true
          seccompProfile: {type: RuntimeDefault}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-relay.dev5.sedware.net]
  # WebSocket upgrades are enabled by default on Envoy Gateway HTTP routes,
  # so no extra BackendTrafficPolicy protocol-upgrade config is required here.
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-relay, port: 80}
---
# Edge ingress for the relay. Envoy proxies run hostNetwork, so Cilium sees the
# terminated edge traffic as reserved:host / reserved:remote-node (same pattern
# as allow-required-cilium-flows). default-deny + the namespace-wide egress DNS
# rule in allow-required-cilium-flows already cover this pod; this policy only
# opens the relay's WebSocket port to the Gateway nodes.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-relay-edge-ingress, namespace: app-netbird}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: netbird-relay}
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: '33080'
        protocol: TCP
---
# Envoy Gateway v1.8 (gateway.envoyproxy.io/v1alpha1). Reproduces the old Cilium
# edge setting proxy-stream-idle-timeout-seconds=86400: Envoy's per-stream idle
# timeout defaults to 5 minutes and silently kills NetBird's long-lived signal
# gRPC and relay WebSocket streams. BackendTrafficPolicy attaches to routes in
# this namespace (policy attachment is same-namespace only), so it is owned by
# this app rather than the gateway-system Gateway.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata: {name: netbird-longlived-streams, namespace: app-netbird}
spec:
  targetRefs:
  - {group: gateway.networking.k8s.io, kind: GRPCRoute, name: netbird-control-grpc}
  - {group: gateway.networking.k8s.io, kind: HTTPRoute, name: netbird-relay}
  timeout:
    http:
      # was Cilium proxy-stream-idle-timeout-seconds=86400 (default 5m).
      streamIdleTimeout: 24h
      # keep the upstream HTTP connection warm across quiet periods (default 1h).
      connectionIdleTimeout: 24h
      # never force-close a healthy long-lived stream (0s = unlimited).
      maxStreamDuration: 0s
