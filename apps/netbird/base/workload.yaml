apiVersion: v1
kind: Service
metadata: {name: netbird-server, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-server}
  ports:
  - {name: http, port: 80, targetPort: http, appProtocol: kubernetes.io/h2c}
  - {name: metrics, port: 9090, targetPort: metrics}
---
apiVersion: v1
kind: Service
metadata: {name: netbird-stun, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-server}
  # externalIPs sind die öffentlichen Gateway-Node-IPs; Cilium annonciert den
  # UDP-Service direkt und benötigt dafür keinen Host-Proxy.
  # Bei IP-Änderungen muss dieser Wert manuell aktualisiert werden.
  externalIPs: [192.168.101.10, 192.168.101.11]
  ports:
  - {name: stun, protocol: UDP, port: 3478, targetPort: stun}
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: netbird-server, namespace: app-netbird}
spec:
  serviceName: netbird-server
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-server}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-server}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: netbird-server
        image: docker.io/netbirdio/netbird-server:0.74.4@sha256:9ad46a0de960323c397ed80723773541e184eaa2048d09be0ac4fc3c6c19b8ae
        args: [--config, /etc/netbird/config.yaml]
        env:
        - {name: NB_DISABLE_GEOLOCATION, value: "true"}
        - {name: NB_PEER_UPDATE_INTERVAL_MS, value: "1"}
        - {name: NB_PEER_UPDATE_STARTUP_PERIOD_S, value: "1"}
        ports:
        - {name: http, containerPort: 80}
        - {name: stun, protocol: UDP, containerPort: 3478}
        - {name: metrics, containerPort: 9090}
        - {name: health, containerPort: 9000}
        readinessProbe:
          httpGet: {path: /oauth2, port: http}
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet: {path: /oauth2, port: http}
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests: {cpu: 100m, memory: 256Mi}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL], add: [NET_BIND_SERVICE]}
          readOnlyRootFilesystem: true
        volumeMounts:
        - {name: config, mountPath: /etc/netbird, readOnly: true}
        - {name: data, mountPath: /var/lib/netbird}
        - {name: tmp, mountPath: /tmp}
      volumes:
      - name: config
        secret: {secretName: netbird-config}
      - name: tmp
        emptyDir: {sizeLimit: 256Mi}
  volumeClaimTemplates:
  - metadata: {name: data}
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: local-path
      resources:
        requests: {storage: 10Gi}
---
apiVersion: v1
kind: Service
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-dashboard}
  ports:
  - {name: http, port: 80, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-dashboard}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-dashboard}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels: {app.kubernetes.io/name: netbird-dashboard}
      containers:
      - name: dashboard
        image: docker.io/netbirdio/dashboard:v2.90.3@sha256:6e23d46c8b512880dd86f178b40baf9043976a478736f2196d89b238105eb1cc
        env:
        - {name: AUTH_AUDIENCE, value: netbird-dashboard}
        - {name: AUTH_CLIENT_ID, value: netbird-dashboard}
        - {name: USE_AUTH0, value: "false"}
        - {name: AUTH_SUPPORTED_SCOPES, value: openid profile email groups}
        - {name: AUTH_REDIRECT_URI, value: /nb-auth}
        - {name: AUTH_SILENT_REDIRECT_URI, value: /nb-silent-auth}
        ports:
        - {name: http, containerPort: 80}
        readinessProbe:
          httpGet: {path: /, port: http}
          initialDelaySeconds: 5
        resources:
          requests: {cpu: 25m, memory: 64Mi}
        securityContext:
          allowPrivilegeEscalation: false
            # nginx benötigt CHOWN/SETUID/SETGID zum Privilege-Drop von root und
            # DAC_OVERRIDE für den Logdateizugriff.
          capabilities:
            drop: [ALL]
            add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID, DAC_OVERRIDE]
        volumeMounts:
        - {name: nginx-tmp, mountPath: /var/lib/nginx/tmp}
        - {name: nginx-logs, mountPath: /var/lib/nginx/logs}
        - {name: nginx-run, mountPath: /run/nginx}
      volumes:
      - name: nginx-tmp
        emptyDir: {sizeLimit: 64Mi}
      - name: nginx-logs
        emptyDir: {sizeLimit: 64Mi}
      - name: nginx-run
        emptyDir: {sizeLimit: 16Mi}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-dashboard, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird.dev8.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-dashboard, port: 80}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-control-http, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-control.dev8.sedware.net]
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-server, port: 80}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata: {name: netbird-control-grpc, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-control.dev8.sedware.net]
  rules:
  - backendRefs:
    - {name: netbird-server, port: 80}
---
# NetBird Relay: WebSocket-Relay für Peers ohne erfolgreiche NAT-Traversierung.
# TLS endet am HTTPS-Listener des Envoy Gateways auf :443. Der Relay selbst nutzt
# HTTP/1.1 und WebSocket auf dem unprivilegierten Port 33080; der Client-Endpunkt
# verwendet deshalb `rels://` (WSS) über den öffentlichen Hostnamen.
apiVersion: v1
kind: Service
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  selector: {app.kubernetes.io/name: netbird-relay}
  ports:
  - {name: relay, port: 80, targetPort: relay}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: netbird-relay}
  template:
    metadata:
      labels: {app.kubernetes.io/name: netbird-relay}
    spec:
      nodeSelector: {public.sedware.net/control-plane: "true"}
      containers:
      - name: relay
        # Der Tag folgt dem NetBird-Release; der Digest fixiert das Image unveränderlich.
        image: docker.io/netbirdio/relay:0.74.4@sha256:81de66b33a66298af410d761d11c5503afdb54cf57a370b49c3d17ed5a56cbfd
        env:
        - {name: NB_LOG_LEVEL, value: info}
        # Der unprivilegierte Listener-Port erfüllt das Restricted-PSS-Profil.
        - {name: NB_LISTEN_ADDRESS, value: ":33080"}
        # Öffentlicher WSS-Endpunkt, den der Management-Server an Peers meldet.
        # `rels://` bedeutet WebSocket-over-TLS; TLS endet am Gateway.
        - {name: NB_EXPOSED_ADDRESS, value: "rels://netbird-relay.dev8.sedware.net:443"}
        # Gemeinsames HMAC-Secret mit dem Management-Server. Es kommt wie das
        # netbird-config-Secret über SOPS/public-cluster-nix und muss exakt
        # Relay.Secret in der Management-Konfiguration entsprechen.
        - name: NB_AUTH_SECRET
          valueFrom:
            secretKeyRef: {name: netbird-relay-auth, key: NB_AUTH_SECRET}
        ports:
        - {name: relay, containerPort: 33080}
        readinessProbe:
          tcpSocket: {port: relay}
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          tcpSocket: {port: relay}
          initialDelaySeconds: 15
          periodSeconds: 30
        resources:
          requests: {cpu: 25m, memory: 64Mi}
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          allowPrivilegeEscalation: false
          capabilities: {drop: [ALL]}
          readOnlyRootFilesystem: true
          seccompProfile: {type: RuntimeDefault}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: netbird-relay, namespace: app-netbird}
spec:
  parentRefs:
  - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [netbird-relay.dev8.sedware.net]
  # WebSocket-Upgrades sind bei Envoy-Gateway-HTTPRoutes standardmäßig aktiv;
  # eine zusätzliche Protocol-Upgrade-Konfiguration ist nicht erforderlich.
  rules:
  - matches:
    - path: {type: PathPrefix, value: /}
    backendRefs:
    - {name: netbird-relay, port: 80}
---
# Envoy Gateway v1.8 mit gateway.envoyproxy.io/v1alpha1. Das standardmäßige
# Per-Stream-Idle-Timeout von fünf Minuten würde NetBirds langlebige Signal-gRPC-
# und Relay-WebSocket-Streams trennen. Die BackendTrafficPolicy muss im selben
# Namespace wie die Routen liegen und gehört daher dieser App statt dem Gateway.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata: {name: netbird-longlived-streams, namespace: app-netbird}
spec:
  targetRefs:
  - {group: gateway.networking.k8s.io, kind: GRPCRoute, name: netbird-control-grpc}
  - {group: gateway.networking.k8s.io, kind: HTTPRoute, name: netbird-relay}
  timeout:
    http:
      # Entspricht der früheren Cilium-Einstellung von 86400 Sekunden.
      streamIdleTimeout: 24h
      # Hält die Upstream-HTTP-Verbindung auch in ruhigen Phasen offen.
      connectionIdleTimeout: 24h
      # Ein gesunder langlebiger Stream wird nicht zwangsweise beendet.
      maxStreamDuration: 0s
