apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Namespace environment label: dev -> prod.
  - patch: |-
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
    target:
      kind: Namespace
      name: app-netbird
  # Dashboard mgmt/OIDC endpoints (mirrors dev overlay; prod hostnames).
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: netbird-dashboard
        namespace: app-netbird
      spec:
        template:
          spec:
            containers:
              - name: dashboard
                env:
                  - name: NETBIRD_MGMT_API_ENDPOINT
                    value: https://netbird-control.sedware.net
                  - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
                    value: https://netbird-control.sedware.net
                  - name: AUTH_AUTHORITY
                    value: https://netbird-control.sedware.net/oauth2
  # Route hostnames (base dev10 -> prod).
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-dashboard
        namespace: app-netbird
      spec:
        hostnames: [netbird.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-control-http
        namespace: app-netbird
      spec:
        hostnames: [netbird-control.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: GRPCRoute
      metadata:
        name: netbird-control-grpc
        namespace: app-netbird
      spec:
        hostnames: [netbird-control.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-control-relay
        namespace: app-netbird
      spec:
        hostnames: [netbird-control.sedware.net]
