apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Namespace environment label: dev -> prod.
  - patch: |-
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
    target:
      kind: Namespace
      name: app-netbird
  # Dashboard mgmt/OIDC endpoints (mirrors dev overlay; prod hostnames).
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: netbird-dashboard
        namespace: app-netbird
      spec:
        template:
          spec:
            containers:
              - name: dashboard
                env:
                  - name: NETBIRD_MGMT_API_ENDPOINT
                    value: https://netbird-control.sedware.net
                  - name: NETBIRD_MGMT_GRPC_API_ENDPOINT
                    value: https://netbird-control.sedware.net
                  - name: AUTH_AUTHORITY
                    value: https://netbird-control.sedware.net/oauth2
  # Relay advertised public WSS endpoint (base dev8 -> prod hostname).
  # In-place replace (env index 2) to preserve base env ordering.
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: rels://netbird-relay.sedware.net:443
    target:
      kind: Deployment
      name: netbird-relay
  # Route hostnames (base dev8 -> prod).
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-dashboard
        namespace: app-netbird
      spec:
        hostnames: [netbird.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-control-http
        namespace: app-netbird
      spec:
        hostnames: [netbird-control.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: GRPCRoute
      metadata:
        name: netbird-control-grpc
        namespace: app-netbird
      spec:
        hostnames: [netbird-control.sedware.net]
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: netbird-relay
        namespace: app-netbird
      spec:
        hostnames: [netbird-relay.sedware.net]
