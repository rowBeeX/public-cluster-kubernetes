# Zentrales CloudNativePG-PostgreSQL des Public-Clusters. Authentik ist die erste
# Datenbank; weitere verwaltete Rollen und Datenbanken können folgen. Die einzelne
# Instanz läuft zusammen mit Authentik und Valkey auf dem Control-Plane-Node.
# Fortlaufende Backups gehen über NetBird zum lokalen RustFS-S3.
apiVersion: v1
kind: Namespace
metadata:
  name: app-postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: platform
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.36
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.36
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.36
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-postgresql}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
