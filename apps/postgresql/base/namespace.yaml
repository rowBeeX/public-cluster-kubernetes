# Central CloudNativePG Postgres for the PUBLIC cluster. authentik is the first
# database; more can follow (managed roles + databases below). Single instance on
# the control-plane node (co-located with authentik + Valkey — one node's uptime).
# Continuous backups go over NetBird to the LOCAL cluster's RustFS S3
# (https://s3.local.dev8.sedware.net, bucket public-postgres-backups).
apiVersion: v1
kind: Namespace
metadata:
  name: app-postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: platform
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: LimitRange
metadata: {name: defaults, namespace: app-postgresql}
spec:
  limits:
  - type: Container
    defaultRequest: {cpu: 50m, memory: 128Mi}
