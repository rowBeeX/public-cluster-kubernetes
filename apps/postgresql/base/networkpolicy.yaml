apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-postgresql}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-dns-egress, namespace: app-postgresql}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns}
    toPorts:
    - ports:
      - {port: '53', protocol: UDP}
      - {port: '53', protocol: TCP}
---
# barman-cloud streamt Backups über NetBird-CGNAT 100.64.0.0/10 auf :443 zum
# lokalen RustFS-S3 und benötigt Vault für die durch VSS materialisierten Keys.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-backup-and-vault-egress, namespace: app-postgresql}
spec:
  endpointSelector: {}
  egress:
  - toCIDR: [100.64.0.0/10]
    toPorts:
    - ports:
      - {port: '443', protocol: TCP}
  - toEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: vault, app.kubernetes.io/name: vault}
    toPorts:
    - ports:
      - {port: '8200', protocol: TCP}
  # Der CNPG-Instance-Manager meldet seinen Status an den API-Server.
  - toEntities: [kube-apiserver]
    toPorts:
    - ports:
      - {port: '443', protocol: TCP}
      - {port: '6443', protocol: TCP}
---
# Authentik verbindet sich auf :5432. CNPG benötigt zusätzlich Intra-Namespace-,
# Kubelet- und API-Server-Zugriff für den Operator.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-postgres-clients, namespace: app-postgresql}
spec:
  endpointSelector:
    matchLabels: {cnpg.io/cluster: postgres}
  ingress:
  - fromEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: app-authentik}
    - matchLabels: {k8s:io.kubernetes.pod.namespace: app-postgresql}
    toPorts:
    - ports:
      - {port: '5432', protocol: TCP}
  # Der CNPG-Operator liest den Instance-Manager-Status auf :8000, startet
  # Backups und scrapt Metriken auf :9187. Ohne diese Freigabe schlagen Status
  # und operatorgesteuerte Base-Backups fehl.
  - fromEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: cnpg-system}
    toPorts:
    - ports:
      - {port: '8000', protocol: TCP}
      - {port: '9187', protocol: TCP}
      - {port: '5432', protocol: TCP}
  # Kubelet-Probes und interner Instance-Manager-Traffic kommen als host an.
  - fromEntities: [host, remote-node, kube-apiserver]
