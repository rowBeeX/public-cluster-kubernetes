# Vault-Self-Service-Identität mit generischer `apps`-Rolle für Backup-S3 und VSS.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgresql-vault
  namespace: app-postgresql
  annotations: {argocd.argoproj.io/sync-wave: "-5"}
automountServiceAccountToken: false
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault
  namespace: app-postgresql
  annotations: {argocd.argoproj.io/sync-wave: "-4"}
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: apps
    serviceAccount: postgresql-vault
    audiences: [vault]
---
# S3-Zugangsdaten fuer Barman Cloud -> lokales RustFS. Wegen der getrennten
# Vault-Instanzen werden sie kontrolliert in den Public-Vault uebertragen; die
# Keys entsprechen den Referenzen im ObjectStore unten.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: pg-backup-s3
  namespace: app-postgresql
  annotations: {argocd.argoproj.io/sync-wave: "-3"}
spec:
  type: kv-v2
  mount: secret
  path: apps/app-postgresql/backup-s3
  refreshAfter: 1h
  vaultAuthRef: vault
  destination:
    create: true
    name: pg-backup-s3
    overwrite: true
    type: Opaque
    transformation:
      excludeRaw: true
      includes: [ACCESS_KEY_ID, ACCESS_SECRET_KEY]
---
# Passwort der verwalteten Datenbankrolle `authentik`. Der folgende Job erzeugt
# es einmalig in Vault; VSS synchronisiert es hier für Authentik.
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-authentik-role
  namespace: app-postgresql
  labels: {app.kubernetes.io/name: postgresql, app.kubernetes.io/component: seed}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  template:
    metadata:
      labels: {app.kubernetes.io/name: postgresql, app.kubernetes.io/component: seed}
    spec:
      serviceAccountName: postgresql-vault
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
      volumes:
      - name: vault-token
        projected:
          sources:
          - serviceAccountToken: {audience: vault, expirationSeconds: 600, path: token}
      containers:
      - name: seed
        image: docker.io/curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: vault-token, mountPath: /var/run/secrets/vault, readOnly: true}
        command:
        - sh
        - -euc
        - |
          VAULT=https://vault.public.internal.sedware.net:8200
          SA=$(cat /var/run/secrets/vault/token)
          TOKEN=$(curl -sf "$VAULT/v1/auth/kubernetes/login" -d "{\"jwt\":\"$SA\",\"role\":\"apps\"}" | sed 's/.*"client_token":[ ]*"\([^"]*\)".*/\1/')
          [ -n "$TOKEN" ] || { echo "vault login failed"; exit 1; }
          # Vorhandenes Passwort lesen oder einmalig erzeugen. Der Wert bleibt in
          # einer Variable, weil das Root-FS read-only ist.
          RESP=$(curl -s -H "X-Vault-Token: $TOKEN" "$VAULT/v1/secret/data/apps/app-postgresql/role-authentik")
          PW=$(printf '%s' "$RESP" | sed -n 's/.*"password":"\([^"]*\)".*/\1/p')
          if [ -z "$PW" ]; then
            PW=$(tr -dc 'a-zA-Z0-9' < /dev/urandom | head -c 40)
            curl -sf -X POST -H "X-Vault-Token: $TOKEN" -H "Content-Type: application/json" \
              "$VAULT/v1/secret/data/apps/app-postgresql/role-authentik" \
              -d "{\"data\":{\"username\":\"authentik\",\"password\":\"$PW\"}}" >/dev/null
            echo "seeded authentik role password"
          else
            echo "authentik role password already in Vault"
          fi
          # Am gemeinsamen Cross-Namespace-Pfad veröffentlichen, den die
          # apps-Rolle für app-authentik read-only freigibt.
          curl -sf -X POST -H "X-Vault-Token: $TOKEN" -H "Content-Type: application/json" \
            "$VAULT/v1/secret/data/apps/app-postgresql/shared/app-authentik/db" \
            -d "{\"data\":{\"username\":\"authentik\",\"password\":\"$PW\"}}" >/dev/null
          echo "published authentik DB credential to shared path"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: pg-role-authentik
  namespace: app-postgresql
  annotations: {argocd.argoproj.io/sync-wave: "-3"}
spec:
  type: kv-v2
  mount: secret
  path: apps/app-postgresql/role-authentik
  refreshAfter: 1h
  vaultAuthRef: vault
  destination:
    create: true
    name: pg-role-authentik
    overwrite: true
    type: kubernetes.io/basic-auth
    transformation:
      excludeRaw: true
      includes: [username, password]
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata: {name: postgres-backup, namespace: app-postgresql}
spec:
  retentionPolicy: 14d
  configuration:
    destinationPath: s3://public-postgres-backups/
    endpointURL: https://s3.local.dev13.sedware.net
    s3Credentials:
      accessKeyId: {name: pg-backup-s3, key: ACCESS_KEY_ID}
      secretAccessKey: {name: pg-backup-s3, key: ACCESS_SECRET_KEY}
    wal: {compression: gzip}
    data: {compression: gzip}
  instanceSidecarConfiguration:
    resources:
      requests: {cpu: 20m, memory: 64Mi}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: app-postgresql
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18@sha256:bc38076701925cfe0f5810768e32d5b6421356534d18eeef3d4a4797614afc9c
  imagePullPolicy: IfNotPresent
  enableSuperuserAccess: false
  enablePDB: false
  primaryUpdateMethod: switchover
  primaryUpdateStrategy: unsupervised
  inheritedMetadata:
    annotations: {descheduler.alpha.kubernetes.io/evict: "false"}
  monitoring:
    disableDefaultQueries: true
  storage:
    size: 10Gi
    storageClass: public-primary-super-fast
  resources:
    requests: {cpu: 100m, memory: 256Mi}
  affinity:
    nodeSelector: {public.sedware.net/control-plane: "true"}
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
  managed:
    roles:
    - name: authentik
      ensure: present
      login: true
      superuser: false
      createdb: false
      createrole: false
      inherit: true
      connectionLimit: -1
      passwordSecret: {name: pg-role-authentik}
  # Kontinuierliche WAL-Archivierung und Base-Backups über CNPG-I.
  plugins:
  - name: barman-cloud.cloudnative-pg.io
    enabled: true
    isWALArchiver: true
    parameters: {barmanObjectName: postgres-backup}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata: {name: postgres-daily, namespace: app-postgresql}
spec:
  schedule: "0 30 2 * * *"
  backupOwnerReference: self
  method: plugin
  pluginConfiguration: {name: barman-cloud.cloudnative-pg.io}
  cluster: {name: postgres}
