apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay. Die Basis enthält Dev-Werte für Namespace-Label und
# Barman-Backup-Endpunkt. Hier werden nur das Label und der lokale RustFS-S3-Host
# auf Production umgestellt.
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-postgresql
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  - target:
      kind: ObjectStore
      name: postgres-backup
    patch: |
      - op: replace
        path: /spec/configuration/endpointURL
        value: https://s3.local.sedware.net
