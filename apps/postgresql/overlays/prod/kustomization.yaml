apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay. The base bakes in the dev6 values (namespace environment label
# and the barman backup endpoint), so the only environment-specific work here is
# flipping those to prod: the environment label and the LOCAL RustFS S3 host
# (s3.local.dev6.sedware.net -> s3.local.sedware.net).
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-postgresql
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  - target:
      kind: Cluster
      name: postgres
    patch: |
      - op: replace
        path: /spec/backup/barmanObjectStore/endpointURL
        value: https://s3.local.sedware.net
