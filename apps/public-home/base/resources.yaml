apiVersion: v1
kind: Namespace
metadata:
  name: app-public-home
  labels:
    app.kubernetes.io/part-of: public-cluster
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: app-public-home
spec:
  limits:
    - type: Container
      defaultRequest: { cpu: 20m, memory: 32Mi }
      default: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: app-public-home
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-home
  namespace: app-public-home
spec:
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: public-home }
  template:
    metadata:
      labels: { app.kubernetes.io/name: public-home }
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: public-home }
      containers:
        - name: http
          image: docker.io/rancher/mirrored-library-busybox:1.37.0@sha256:101b4afd76732482eff9b95cae5f94bcf295e521fbec4e01b69c5421f3f3f3e5
          command: [busybox, httpd, -f, -p, "8080", -h, /www]
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 20m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
          volumeMounts:
            - { name: content, mountPath: /www, readOnly: true }
      volumes:
        - name: content
          configMap: { name: public-home-content }
---
apiVersion: v1
kind: Service
metadata:
  name: public-home
  namespace: app-public-home
spec:
  selector: { app.kubernetes.io/name: public-home }
  ports:
    - { name: http, port: 80, targetPort: http }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: app-public-home
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-web-and-dns
  namespace: app-public-home
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - ipBlock: { cidr: 192.168.101.0/24 }
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
