apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  # public-nginx liefert statischen Inhalt und braucht keinen Egress.
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-edge-ingress, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  # Ingress ausschließlich von den hostNetwork-Proxies des Envoy Gateways.
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - {port: '8080', protocol: TCP}
