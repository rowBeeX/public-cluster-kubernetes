apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-edge-ingress, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  # Ingress ausschließlich von den hostNetwork-Proxies des Envoy Gateways.
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - {port: '8080', protocol: TCP}
