apiVersion: v1
kind: Namespace
metadata:
  name: app-public-nginx
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
---
# Public internet-facing test server (sibling of `smoke`). Serves a static page
# at https://public-nginx.dev3.sedware.net over the public Envoy edge, proving an
# ordinary web app reaches the internet end-to-end (IPv4+IPv6, TLS, routing).
# nginx-unprivileged listens on 8080 as a non-root user so the namespace can
# enforce the restricted Pod-Security profile.
apiVersion: v1
kind: ConfigMap
metadata: {name: public-nginx-html, namespace: app-public-nginx}
data:
  index.html: |
    <!doctype html>
    <title>public-nginx</title>
    <h1>public-nginx</h1>
    <p>Test server running in the <strong>public</strong> cluster,
    served directly by the public Envoy edge.</p>
    <p>public-nginx.dev3.sedware.net</p>
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  replicas: 2
  selector:
    matchLabels: {app: public-nginx}
  template:
    metadata:
      labels: {app: public-nginx}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.29-alpine@sha256:0c79d56aee561a1d81c63f00eee5fb5fe29279560cdc55e91425133104c7fbe6
          ports:
            - {name: http, containerPort: 8080}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {memory: 32Mi}
          volumeMounts:
            - {name: html, mountPath: /usr/share/nginx/html, readOnly: true}
            - {name: cache, mountPath: /var/cache/nginx}
            - {name: run, mountPath: /var/run}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: html
          configMap: {name: public-nginx-html}
        - {name: cache, emptyDir: {}}
        - {name: run, emptyDir: {}}
        - {name: tmp, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  selector: {app: public-nginx}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [public-nginx.dev3.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - {name: public-nginx, port: 80}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-edge-ingress, namespace: app-public-nginx}
spec:
  endpointSelector: {}
  # Ingress only from the Envoy Gateway proxies (hostNetwork → host/remote-node).
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - {port: '8080', protocol: TCP}
