# Public internet-facing test server. Serves a static page
# at https://public-nginx.dev7.sedware.net over the public Envoy edge, proving an
# ordinary web app reaches the internet end-to-end (IPv4+IPv6, TLS, routing).
# nginx-unprivileged listens on 8080 as a non-root user so the namespace can
# enforce the restricted Pod-Security profile.
apiVersion: v1
kind: ConfigMap
metadata: {name: public-nginx-html, namespace: app-public-nginx}
data:
  index.html: |
    <!doctype html>
    <title>public-nginx</title>
    <h1>public-nginx</h1>
    <p>Test server running in the <strong>public</strong> cluster,
    served directly by the public Envoy edge.</p>
    <p>public-nginx.dev7.sedware.net</p>
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: public-nginx}
  template:
    metadata:
      labels: {app.kubernetes.io/name: public-nginx}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.29-alpine@sha256:0c79d56aee561a1d81c63f00eee5fb5fe29279560cdc55e91425133104c7fbe6
          ports:
            - {name: http, containerPort: 8080}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          resources:
            requests: {cpu: 5m, memory: 16Mi}
          volumeMounts:
            - {name: html, mountPath: /usr/share/nginx/html, readOnly: true}
            - {name: cache, mountPath: /var/cache/nginx}
            - {name: run, mountPath: /var/run}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: html
          configMap: {name: public-nginx-html}
        - {name: cache, emptyDir: {}}
        - {name: run, emptyDir: {}}
        - {name: tmp, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  selector: {app.kubernetes.io/name: public-nginx}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [public-nginx.dev7.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - {name: public-nginx, port: 80}
