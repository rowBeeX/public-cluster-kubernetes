# Öffentlicher Testserver hinter dem Public Envoy Edge. Die statische Seite unter
# https://public-nginx.dev9.sedware.net belegt IPv4, IPv6, TLS und Routing.
# nginx-unprivileged lauscht ohne root-Rechte auf 8080, sodass der Namespace das
# Restricted-Pod-Security-Profil erzwingen kann.
apiVersion: v1
kind: ConfigMap
metadata: {name: public-nginx-html, namespace: app-public-nginx}
data:
  index.html: |
    <!doctype html>
    <title>public-nginx</title>
    <h1>public-nginx</h1>
    <p>Test server running in the <strong>public</strong> cluster,
    served directly by the public Envoy edge.</p>
    <p>public-nginx.dev9.sedware.net</p>
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: public-nginx}
  template:
    metadata:
      labels: {app.kubernetes.io/name: public-nginx}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: nginx
          image: docker.io/nginxinc/nginx-unprivileged:1.31.2-alpine@sha256:70b3a89a79c6c835c122346937816f588f3d5ba9a735538b3ddd0a4c8be05eb2
          ports:
            - {name: http, containerPort: 8080}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          resources:
            requests: {cpu: 5m, memory: 16Mi}
          volumeMounts:
            - {name: html, mountPath: /usr/share/nginx/html, readOnly: true}
            - {name: cache, mountPath: /var/cache/nginx}
            - {name: run, mountPath: /var/run}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: html
          configMap: {name: public-nginx-html}
        - {name: cache, emptyDir: {}}
        - {name: run, emptyDir: {}}
        - {name: tmp, emptyDir: {}}
---
apiVersion: v1
kind: Service
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  selector: {app.kubernetes.io/name: public-nginx}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: public-nginx, namespace: app-public-nginx}
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [public-nginx.dev9.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - {name: public-nginx, port: 80}
