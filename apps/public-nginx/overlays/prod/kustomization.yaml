apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# Die ausgelieferte statische Seite wird auf den Prod-Host umgestellt. Ein
# configMapGenerator mit `behavior: replace` bewahrt auch den abschließenden
# Zeilenumbruch und damit die Byte-Parität zum Dev-Render.
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: public-nginx-html
    namespace: app-public-nginx
    behavior: replace
    files:
      - index.html
patches:
  # Namespace environment label: dev -> prod.
  - target:
      kind: Namespace
      name: app-public-nginx
    patch: |-
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
  # HTTPRoute hostname: dev13 host -> prod host.
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: public-nginx
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: public-nginx.sedware.net
