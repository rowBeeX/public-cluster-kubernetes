apiVersion: v1
kind: Namespace
metadata:
  name: app-smoke
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/part-of: public-cluster
    app.kubernetes.io/managed-by: argocd
    core.sedware.net/owner: tobias
    core.sedware.net/purpose: application
    core.sedware.net/environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
---
# Public lightweight smoke-test app (§8/§21): stateless, no secrets, no local
# access. It exists to prove the public Envoy edge end-to-end — IPv4, IPv6, TLS,
# HTTP/2, routing, access logs and CiliumNetworkPolicy. whoami echoes the request
# (headers, client IP), which makes the edge behaviour observable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smoke
  namespace: app-smoke
spec:
  replicas: 2
  selector:
    matchLabels: {app: smoke}
  template:
    metadata:
      labels: {app: smoke}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: whoami
          image: docker.io/traefik/whoami:v1.10.3@sha256:43a68d10b9dfcfc3ffbfe4dd42100dc9aeaf29b3a5636c856337a5940f1b4f1c
          args: ["--port", "8080"]
          ports:
            - {name: http, containerPort: 8080}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          resources:
            requests: {cpu: 5m, memory: 16Mi}
            limits: {memory: 32Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: smoke
  namespace: app-smoke
spec:
  selector: {app: smoke}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: smoke
  namespace: app-smoke
spec:
  parentRefs:
    - {name: public-dev, namespace: gateway-system, sectionName: https}
  hostnames: [smoke.dev5.sedware.net]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - {name: smoke, port: 80}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-smoke}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-edge-ingress, namespace: app-smoke}
spec:
  endpointSelector: {}
  # Ingress only from the Envoy Gateway proxies (hostNetwork → host/remote-node).
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - {port: '8080', protocol: TCP}
