apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-valkey}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-dns-egress, namespace: app-valkey}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns}
    toPorts:
    - ports:
      - {port: '53', protocol: UDP}
      - {port: '53', protocol: TCP}
---
# Consumers of the shared cache. Add a consumer's namespace here to grant it
# access (mirrors the local cluster's app-valkey/allow-app-ingress).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-app-ingress, namespace: app-valkey}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: valkey}
  ingress:
  - fromEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: app-authentik}
    toPorts:
    - ports:
      - {port: '6379', protocol: TCP}
