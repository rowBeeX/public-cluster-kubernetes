apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: default-deny, namespace: app-valkey}
spec:
  endpointSelector: {}
  # Leere ingress:[]/egress:[]-Arrays verwirft Cilium (Valid=False = No-op). Die
  # gueltige Default-Deny-Form selektiert eine leere Endpoint-Menge, wodurch der
  # Endpoint in beide Richtungen in Default-Deny faellt (wie im lokalen Cluster).
  ingress:
    - fromEndpoints: []
  egress:
    - toEndpoints: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-dns-egress, namespace: app-valkey}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: kube-system, k8s:k8s-app: kube-dns}
    toPorts:
    - ports:
      - {port: '53', protocol: UDP}
      - {port: '53', protocol: TCP}
---
# Consumer des gemeinsamen Caches. Nur hier explizit aufgeführte Namespaces
# erhalten Zugriff, analog zu app-valkey/allow-app-ingress im lokalen Cluster.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: {name: allow-app-ingress, namespace: app-valkey}
spec:
  endpointSelector:
    matchLabels: {app.kubernetes.io/name: valkey}
  ingress:
  - fromEndpoints:
    - matchLabels: {k8s:io.kubernetes.pod.namespace: app-authentik}
    toPorts:
    - ports:
      - {port: '6379', protocol: TCP}
