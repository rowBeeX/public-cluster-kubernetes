apiVersion: v1
kind: Service
metadata: {name: valkey, namespace: app-valkey}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: valkey}
  ports:
  - {name: valkey, port: 6379, targetPort: valkey}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: app-valkey
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/part-of: public-cluster
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector:
    matchLabels: {app.kubernetes.io/name: valkey}
  template:
    metadata:
      annotations:
        # Gemeinsamer Cache ohne Eviction, damit Consumer-State nicht verloren geht.
        descheduler.alpha.kubernetes.io/evict: "false"
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/part-of: public-cluster
    spec:
      automountServiceAccountToken: false
      nodeSelector: {public.sedware.net/control-plane: "true"}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: valkey
        image: docker.io/valkey/valkey:9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
        # Reiner In-Memory-Betrieb ohne RDB oder AOF. protected-mode ist aus, weil
        # Der Zugriff wird über CiliumNetworkPolicy auf Consumer-Namespaces
        # begrenzt, nicht per Passwort. noeviction verwirft keine TTL-Keys still.
        args: [valkey-server, --save, "", --appendonly, "no", --protected-mode, "no",
               --maxmemory, 512mb, --maxmemory-policy, noeviction]
        ports:
        - {name: valkey, containerPort: 6379}
        startupProbe: {tcpSocket: {port: valkey}, periodSeconds: 3, failureThreshold: 20}
        readinessProbe: {exec: {command: [valkey-cli, ping]}, periodSeconds: 10}
        livenessProbe: {tcpSocket: {port: valkey}, periodSeconds: 10}
        resources:
          requests: {cpu: 25m, memory: 64Mi}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: [ALL]}
        volumeMounts:
        - {name: data, mountPath: /data}
      volumes:
      # Entbehrlicher Cache-Zustand; emptyDir wird bei Pod-Neustart bewusst geleert.
      - name: data
        emptyDir: {sizeLimit: 512Mi}
