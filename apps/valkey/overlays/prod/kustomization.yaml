apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod-Overlay. Valkey ist intern ohne Ingress und verwendet in beiden
# Umgebungen dasselbe Cluster-DNS; nur das Namespace-Label unterscheidet sich.
resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: app-valkey
    patch: |
      - op: replace
        path: /metadata/labels/core.sedware.net~1environment
        value: prod
